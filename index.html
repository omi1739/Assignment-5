<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GittHub Issues Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        .font {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="font">

    <section class="login w-full max-w-md text-[#1F2937] mx-auto mt-5 to-blue-300  border-base-300 rounded-box border p-4">

        <div class=" text-center items-center pt-10 mb-5">
            <img class="mx-auto" src="./assets/github-logo.png" alt="">
            <h2 class="mt-5 text-2xl font-medium">GitHub Issues Tracker</h2>
            <p class="text-[#64748B] pt-1">Sign in to manage your issues</p>
        </div>

        <form class="fieldset ">
            <fieldset class="fieldset ">
                <label class="label w-[90%] mx-auto text-lg text-[#1F2937] font-medium">Username</label>
                <input id="username" type="text" class="input validator w-[90%] mx-auto" placeholder="Enter Username" required />
                <p class="validator-hint hidden">Required</p>
            </fieldset>

            <fieldset class="fieldset ">
                <label class="label w-[90%] mx-auto text-lg text-[#1F2937] font-medium">Password</label>
                <input id="password" type="password" class="input validator w-[90%] mx-auto" placeholder="Enter Password" required />
                <p class="validator-hint hidden">Required</p>
            </fieldset>

            <button id="sign-in-button" class="btn btn-primary mt-4 w-[90%] mx-auto" type="button">Sign In</button>
    
        </form>

        <div class="divider">OR</div>

        <div class="text-center">
            <p><small class="text-[#64748B]">Demo Credentials:</small></p>

            <p class="text-[#1F2937]  mt-6"><span class="font-medium text-[#1F2937]">Username: </span>admin</p>
            <p class="text-[#1F2937]"><span class="font-medium text-[#1F2937]">Password: </span>admin123</p>

        </div>
        
    </section>

    <script src="./index.js"></script>
    <script src="./script/login.js"></script>
</body>

</html>
