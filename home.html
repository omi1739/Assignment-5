<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GittHub Issues Tracker | Home</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


</head>

<body>

    <header>
        <nav class="flex justify-between items-center p-4 shadow-md">
            <div class="flex items-center gap-2">
                <img class="w-10 h-10" src="./assets/github-logo.png" alt="GitHub logo">
                <p class="text-2xl font-bold">GitHub Issues Tracker</p>
            </div>
            <div class="flex items-center gap-2">
                <i class="fa-brands fa-sistrix"></i>
                <input type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
                <button class="btn btn-primary flex items-center gap-2"><i class="fa-solid fa-plus"></i> New
                    Issue</button>
            </div>
        </nav>
    </header>

    <main>

        <section class="flex gap-5 w-[80%] bg-white mt-10 mx-auto shadow-sm py-5 px-3 rounded-md">
            <div id="all-button" class="btn btn-primary px-8 text-center">All</div>
            <div id="open-button" class="btn px-8">Open</div>
            <div id="closed-button" class="btn px-8">Closed</div>
        </section>

        <section class="flex justify-between gap-5 w-[80%] bg-white mt-5 mx-auto shadow-sm py-5 pl-3 rounded-md">

            <div class="flex items-center  gap-2">
                <div>
                    <img src="./assets/Aperture.png" alt="">
                </div>
                <div>
                    <h2 class="text-[#1F2937] text-2xl font-medium"><span id="number-of-issues"></span> Issues</h2>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex items-center pr-3">
                <ul class="flex gap-5 ">
                    <li class="flex items-center gap-3 text-green-500"><span class="w-3 h-3 rounded-full bg-green-600 ">
                        </span> Open </li>
                </ul>
                <ul class="flex gap-5 ">
                    <li class="flex items-center gap-3 pl-3 text-purple-500"><span
                            class="w-3 h-3 rounded-full bg-purple-600"> </span> Closed </li>
                </ul>
            </div>

        </section>

        <section id="cards-container" class="w-[80%] bg-white shadow-sm mx-auto mt-1 grid grid-cols-4 gap-5">


            <div class="shadow-sm py-4 px-3 rounded-md">
                <div class="flex justify-between mb-3">
                    <img src="./assets/Open-Status.png" alt="">
                    <p class="bg-red-200 text-red-600 px-2 text-center rounded-2xl ">HIGH</p>
                </div>
                <div>
                    <h2 class="text-[#1F2937] text-xl font-medium mb-2">Fix navigation menu on mobile devices</h2>
                    <p class="text-[#64748B] mb-2">The navigation menu doesn't collapse properly on mobile devices...</p>
                    <button class=" rounded-xl text-red-600 border-red-400 px-3 py-1 border bg-red-100 "><i class="fa-solid fa-bug"></i> BUG</button>
                    <button class=" rounded-xl text-yellow-700 border border-yellow-400 py-1 px-3 bg-yellow-100"><i class="fa-regular fa-life-ring"></i> HELP WANTED</button>
                </div>
                <hr class="bg-gray-400 mt-5">

                <div class="mt-3">
                    <p class="text-[#64748B]">#1 by John_doe</p>
                    <p class="text-[#64748B]">1/15/2025</p>
                </div>

            </div>



        </section>

    </main>




    <script src="./home.js"></script>
</body>

</html>
