<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GittHub Issues Tracker | Home</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


</head>

<body>

    <header>
        <nav class="flex justify-between items-center p-4 shadow-md">
            <div class="flex items-center gap-2">
                <img class="w-10 h-10" src="./assets/github-logo.png" alt="GitHub logo">
                <p class="text-2xl font-bold">GitHub Issues Tracker</p>
            </div>
            <div class="flex items-center gap-2">
                <input id="input-search" type="text" placeholder="Search issues..." class="input" required />
                <button id="btn-search" class="btn btn-primary flex items-center gap-2"> <i class="fa-brands fa-sistrix"></i> Search</button>
            </div>
        </nav>
    </header>

    <main>

        <section class="flex gap-5 w-[80%] bg-white mt-10 mx-auto shadow-sm py-5 px-3 rounded-md">
            <button id="all-button" class="btn btn-primary px-8 text-center">All</button>
            <button id="open-button" class="btn px-8">Open</button>
            <button id="closed-button" class="btn px-8">Closed</button>
        </section>

        <section class="flex justify-between gap-5 w-[80%] bg-white mt-5 mb-3 mx-auto shadow-sm py-5 pl-3 rounded-md">

            <div class="flex items-center  gap-2">
                <div>
                    <img src="./assets/Aperture.png" alt="">
                </div>
                <div>
                    <h2 class="text-[#1F2937] text-2xl font-medium"><span id="number-of-issues"></span> Issues</h2>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex items-center pr-3">
                <ul class="flex gap-5 ">
                    <li class="flex items-center gap-3 text-green-500"><span class="w-3 h-3 rounded-full bg-green-600 ">
                        </span> Open </li>
                </ul>
                <ul class="flex gap-5 ">
                    <li class="flex items-center gap-3 pl-3 text-purple-500"><span
                            class="w-3 h-3 rounded-full bg-purple-600"> </span> Closed </li>
                </ul>
            </div>

        </section>


        <section id="loading" class="flex justify-center items-center py-10 hidden">
           <span class="loading loading-spinner text-neutral"></span>
        </section>


        <section id="cards-container" class="w-[80%] mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2">

        </section>

    </main>


    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog id="word_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
          
            <div id="details-container" class="">
               
            </div>

            <div class="modal-action">
                <form method="dialog">

                    <button class="btn btn-primary mt-5">Close</button>
                </form>
            </div>
        </div>
    </dialog>



    <script src="./home.js"></script>
</body>

</html>
